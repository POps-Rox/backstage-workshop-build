site_name: "Backstage Workshop Build"
site_description: Documentation for Backstage Workshop Build
repo_url: https://github.com/POps-Rox/backstage-workshop-build
edit_uri: edit/main/docs/

nav:
  - Home: index.md

plugins:
  - techdocs-core

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
