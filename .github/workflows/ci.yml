name: "🎭 Backstage CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: "🏗️ Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript Check
        run: yarn tsc

      - name: Build
        run: yarn build:all

      - name: Lint
        run: yarn lint:all

      - name: Test
        run: yarn test
